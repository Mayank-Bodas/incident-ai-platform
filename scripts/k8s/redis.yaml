apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-redis
  namespace: incident-management
  labels:
    app: incident-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident-redis
  template:
    metadata:
      labels:
        app: incident-redis
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          imagePullPolicy: IfNotPresent
          command:
            - "redis-server"
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
            - "--maxmemory"
            - "256mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: incident-secrets
                  key: redis-password
          ports:
            - containerPort: 6379
              name: redis
---
apiVersion: v1
kind: Service
metadata:
  name: incident-redis
  namespace: incident-management
spec:
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: incident-redis
  type: ClusterIP
