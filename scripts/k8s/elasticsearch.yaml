apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-elasticsearch
  namespace: incident-management
  labels:
    app: incident-elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident-elasticsearch
  template:
    metadata:
      labels:
        app: incident-elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9200
              name: es-http
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          resources:
            limits:
              memory: 1Gi
            requests:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: incident-elasticsearch
  namespace: incident-management
spec:
  ports:
    - port: 9200
      targetPort: 9200
      name: es-http
  selector:
    app: incident-elasticsearch
  type: ClusterIP
