apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: incident-management
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-postgres
  namespace: incident-management
  labels:
    app: incident-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident-postgres
  template:
    metadata:
      labels:
        app: incident-postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: incident_db
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: incident-configmap
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: incident-secrets
                  key: postgres-password
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: incident-postgres
  namespace: incident-management
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: incident-postgres
  type: ClusterIP
