apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-zookeeper
  namespace: incident-management
  labels:
    app: incident-zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident-zookeeper
  template:
    metadata:
      labels:
        app: incident-zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.7.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2181
              name: client
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
---
apiVersion: v1
kind: Service
metadata:
  name: incident-zookeeper
  namespace: incident-management
spec:
  ports:
    - port: 2181
      targetPort: 2181
      name: client
  selector:
    app: incident-zookeeper
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-kafka
  namespace: incident-management
  labels:
    app: incident-kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident-kafka
  template:
    metadata:
      labels:
        app: incident-kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.7.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9092
              name: kafka
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "incident-zookeeper:2181"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://incident-kafka:9092"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "168"
---
apiVersion: v1
kind: Service
metadata:
  name: incident-kafka
  namespace: incident-management
spec:
  ports:
    - port: 9092
      targetPort: 9092
      name: kafka
  selector:
    app: incident-kafka
  type: ClusterIP
