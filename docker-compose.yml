# WHY docker-compose?
# One command to spin up your ENTIRE infrastructure stack.
# Real companies use this for local development. Production uses Kubernetes.
# Every service here mirrors what runs in production — same image, different config.

services:

  # ==================== PostgreSQL ====================
  # WHY PostgreSQL?
  # ACID compliant, JSONB for flexible payloads, pgvector for RAG embeddings.
  # We're using ONE database with schema-per-domain convention.
  postgres:
    image: pgvector/pgvector:pg16
    # WHY pgvector image instead of plain postgres?
    # It has the pgvector extension pre-installed — needed for RAG embeddings on Day 6.
    # pgvector lets PostgreSQL store and query vector embeddings without a separate vector DB.
    container_name: incident-postgres
    environment:
      POSTGRES_DB: incident_db
      POSTGRES_USER: incident_user
      POSTGRES_PASSWORD: incident_pass
      # WHY not use 'postgres' as username?
      # Security practice: never use default credentials even in dev.
      # In production, use AWS Secrets Manager / Vault, NEVER hardcode.
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # WHY volumes?
      # Persist data across container restarts. Without this, every docker-compose down
      # wipes your database. In production: managed DB (AWS RDS, Cloud SQL).
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql
      # WHY init.sql?
      # Runs ONCE on first startup. We use it to enable the pgvector extension.
      # Flyway handles all table migrations — single source of truth.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident_user -d incident_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      # WHY healthcheck?
      # Other services (Spring Boot) wait for postgres to be READY, not just started.
      # "started" ≠ "accepting connections". This prevents connection refused errors.

  # ==================== Apache Kafka ====================
  # WHY Kafka?
  # Event backbone: Alert → Kafka → Incident → Kafka → Investigation
  # Decouples producers from consumers. Enables replay. Scales to millions of events/sec.
  # Interview: "Kafka is a distributed commit log, not a message queue"
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: incident-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    # WHY Zookeeper?
    # Kafka uses Zookeeper for cluster coordination (leader election, config storage).
    # Note: Kafka 3.x supports KRaft (Kafka Raft) mode WITHOUT Zookeeper.
    # We use Zookeeper here because it's battle-tested and more common in enterprises.

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: incident-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # WHY replication factor 1 in dev?
      # In dev: 1 broker, replication factor > 1 would fail.
      # In production: minimum 3 brokers, replication factor 3.
      # This is a key difference between dev and prod configs — interviewers ask this!
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: false
      # WHY disable auto topic creation?
      # We create topics explicitly with correct partition counts.
      # Auto-creation uses defaults (1 partition) — breaks ordering and scaling.
      KAFKA_LOG_RETENTION_HOURS: 168
      # WHY 168 hours (7 days)?
      # Kafka retains messages for replay. 7 days lets you reprocess a week of alerts.
      # This is Kafka's superpower over RabbitMQ.
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Kafka topic initialization — creates topics before app starts
  kafka-init:
    image: confluentinc/cp-kafka:7.7.0
    container_name: incident-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      # WHY these specific partition counts?
      # alert-events: 6 partitions = 6 consumers can read in parallel (scalability)
      # incident-events: 3 partitions = ordered per incident (partition by incidentId)
      # investigation-events: 3 partitions = one consumer per agent type
      # recommendation-events: 1 partition = single ordered stream (simplicity)
      
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic alert-events --partitions 6 --replication-factor 1
      
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic incident-events --partitions 3 --replication-factor 1
      
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic investigation-events --partitions 3 --replication-factor 1
      
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic recommendation-events --partitions 1 --replication-factor 1
      
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic alert-events-dlq --partitions 1 --replication-factor 1
      
      echo 'Topics created successfully'
      "
    # WHY DLQ (Dead Letter Queue)?
    # When a consumer fails to process a message after N retries, it goes to DLQ.
    # Ops team can inspect failed messages and reprocess them. Without DLQ, failed
    # messages block the entire partition. Interview: "How do you handle poison pill messages?"

  # ==================== Redis ====================
  # WHY Redis?
  # L2 distributed cache. Incidents queried 100x more than created.
  # Cache-Aside: check Redis first, if miss → DB → store in Redis.
  # Also used for: rate limiting (token bucket), session storage.
  redis:
    image: redis:7.4-alpine
    container_name: incident-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis_pass --maxmemory 256mb --maxmemory-policy allkeys-lru
    # WHY maxmemory-policy allkeys-lru?
    # When Redis hits 256MB, evict Least Recently Used keys.
    # For a cache, this is correct — keep hot data, evict cold data.
    # Alternative: volatile-lru (only evict keys with TTL set) — more conservative.
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Elasticsearch ====================
  # WHY Elasticsearch?
  # Full-text search for incidents and logs using inverted index.
  # PostgreSQL LIKE '%query%' = full table scan. Elasticsearch = O(1) lookup.
  # Interview: "What's an inverted index?" → Maps terms to documents, like book index
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: incident-elasticsearch
    environment:
      - discovery.type=single-node
      # WHY single-node in dev?
      # Production needs 3+ nodes for HA. Single-node = simpler local setup.
      - xpack.security.enabled=false
      # WHY disable security in dev?
      # In prod, always enable TLS + authentication. Dev: simplicity.
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      # WHY limit JVM heap?
      # Elasticsearch is memory-hungry. 512MB prevents OOM on your MacBook.
      # Rule: ES heap = 50% of available RAM, max 32GB (pointer compression).
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== Kibana ====================
  # WHY Kibana?
  # Visual UI for Elasticsearch — browse incident indexes, search logs, create dashboards.
  # Not required for the app to work, but invaluable for development and ops.
  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: incident-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

  # ==================== The Spring Boot App (Day 7 addition) ====================
  # COMMENTED OUT: We'll run the app locally during development (faster iteration).
  # On Day 7, we'll uncomment this for full docker-compose deployment.
  # app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: incident-app
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     kafka:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     SPRING_PROFILES_ACTIVE: docker

# ==================== Volumes ====================
# WHY named volumes?
# Named volumes persist across container restarts. If you use bind mounts (./data),
# permissions can be messy on M1 Mac. Named volumes are managed by Docker.
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local

# ==================== Networks ====================
# WHY no custom network?
# docker-compose creates a default network where all services can reach each other
# by container name (e.g., "kafka", "postgres"). Custom networks add isolation
# — relevant in production with multiple compose files.
